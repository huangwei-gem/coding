<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agnes AI 创作工坊</title>
<style>
  :root {
    --primary: #7c3aed;
    --primary-light: #8b5cf6;
    --primary-dark: #6d28d9;
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #242442;
    --border: #2d2d50;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent-green: #22c55e;
    --accent-blue: #3b82f6;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 22px; font-weight: 700; letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 10px;
  }
  .header h1 span { background: rgba(255,255,255,0.15); padding: 2px 10px; border-radius: 6px; font-size: 13px; font-weight: 500; }
  .header-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green); display: inline-block; }
  .container { display: flex; gap: 0; height: calc(100vh - 68px); }
  .sidebar {
    width: 380px; min-width: 380px; background: var(--surface);
    border-right: 1px solid var(--border); overflow-y: auto; padding: 20px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface2); border-radius: var(--radius); padding: 3px; }
  .tab {
    flex: 1; padding: 10px; text-align: center; border-radius: 10px;
    cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text-dim);
    transition: all .2s; border: none; background: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--primary); color: #fff; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 5px;
  }
  .form-group .hint { font-size: 11px; color: var(--text-dim); opacity: 0.7; margin-top: 3px; }
  input, textarea, select {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 14px;
    transition: border .2s; outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--primary-light); }
  textarea { resize: vertical; min-height: 72px; font-family: inherit; }
  select { cursor: pointer; }
  input[type="number"] { width: 100%; }
  .row { display: flex; gap: 12px; }
  .row .form-group { flex: 1; }
  .btn {
    width: 100%; padding: 12px; border-radius: var(--radius); border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-light); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-secondary { background: var(--surface2); color: var(--text); }
  .btn-secondary:hover { background: var(--border); }
  .main {
    flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column;
  }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .result-area {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; min-height: 400px;
  }
  .result-placeholder { text-align: center; color: var(--text-dim); padding: 60px 20px; }
  .result-placeholder .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
  .result-placeholder h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .result-card { width: 100%; max-width: 720px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  .result-card img, .result-card video { width: 100%; display: block; }
  .result-card .meta { padding: 16px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-dim); }
  .result-card .meta a { color: var(--primary-light); text-decoration: none; }
  .result-card .meta a:hover { text-decoration: underline; }
  .progress-bar { width: 100%; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin: 12px 0; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent-blue)); border-radius: 3px; transition: width .5s ease; }
  .progress-text { font-size: 13px; color: var(--text-dim); text-align: center; }
  .history-section { margin-top: 24px; }
  .clear-history-btn {
    font-size: 11px; color: var(--text-dim); cursor: pointer; padding: 2px 8px;
    border-radius: 4px; border: 1px solid var(--border); background: transparent;
    transition: all .2s; margin-left: auto;
  }
  .clear-history-btn:hover { border-color: #ef4444; color: #ef4444; }
  .history-header {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    font-size: 14px; color: var(--text-dim); margin-bottom: 12px; user-select: none;
    padding: 6px 8px; border-radius: 6px; transition: background .2s;
  }
  .history-header:hover { background: var(--surface2); }
  .history-header .arrow { transition: transform .2s; font-size: 12px; }
  .history-header .arrow.collapsed { transform: rotate(-90deg); }
  .history-body { overflow: hidden; transition: max-height .3s ease; max-height: 0; }
  .history-body.open { max-height: 2000px; }
  .history-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; background: var(--surface); border-radius: 8px;
    border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; transition: all .2s;
  }
  .history-item:hover { border-color: var(--primary); }
  .history-item .thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; background: var(--surface2); }
  .history-item .info { flex: 1; min-width: 0; }
  .history-item .info .title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-item .info .sub { font-size: 11px; color: var(--text-dim); }
  .history-item .type-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .type-badge.image { background: rgba(124,58,237,0.2); color: var(--primary-light); }
  .type-badge.video { background: rgba(59,130,246,0.2); color: var(--accent-blue); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary-light); border-radius: 50%; animation: spin .8s linear infinite; margin: 20px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .presets { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .preset-btn { padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); font-size: 12px; cursor: pointer; transition: all .2s; }
  .preset-btn:hover { border-color: var(--primary-light); color: var(--text); }
  .image-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; width: 100%; }

  /* Upload area */
  .upload-area {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 16px; text-align: center; cursor: pointer;
    transition: all .2s; position: relative;
  }
  .upload-area:hover, .upload-area.dragover { border-color: var(--primary-light); background: rgba(124,58,237,0.05); }
  .upload-area input[type="file"] { display: none; }
  .upload-area .upload-label { font-size: 13px; color: var(--text-dim); }
  .upload-area .upload-label strong { color: var(--primary-light); }
  .upload-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .upload-preview .thumb-wrap { position: relative; width: 64px; height: 64px; }
  .upload-preview .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
  .upload-preview .thumb-wrap .remove { position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; border-radius: 50%; background: #ef4444; color: #fff; font-size: 12px; line-height: 18px; text-align: center; cursor: pointer; border: none; }
  .upload-info { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  /* URL + upload toggle */
  .input-method-toggle {
    display: flex; gap: 4px; margin-bottom: 10px; background: var(--surface2);
    border-radius: 6px; padding: 2px; font-size: 12px;
  }
  .input-method-toggle button {
    flex: 1; padding: 5px; text-align: center; border-radius: 5px;
    cursor: pointer; border: none; background: none; color: var(--text-dim); font-size: 12px; transition: all .2s;
  }
  .input-method-toggle button.active { background: var(--primary); color: #fff; }

  /* Settings modal */
  .settings-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .settings-overlay.open { display: flex; }
  .settings-modal {
    background: var(--surface); border-radius: 16px; border: 1px solid var(--border);
    width: 520px; max-width: 90vw; max-height: 85vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .settings-modal::-webkit-scrollbar { width: 4px; }
  .settings-modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .settings-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0;
    background: var(--surface); z-index: 1; border-radius: 16px 16px 0 0;
  }
  .settings-header h2 { font-size: 18px; font-weight: 700; }
  .settings-close {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .settings-close:hover { border-color: var(--primary-light); color: var(--text); }
  .settings-body { padding: 8px 24px 24px; }
  .settings-group { margin-top: 20px; }
  .settings-group:first-child { margin-top: 12px; }
  .settings-group h3 {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
    color: var(--text-dim); margin-bottom: 12px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .settings-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .settings-row label { font-size: 13px; color: var(--text); min-width: 100px; flex-shrink: 0; }
  .settings-row input, .settings-row select {
    flex: 1; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 13px; outline: none;
  }
  .settings-row input:focus, .settings-row select:focus { border-color: var(--primary-light); }
  .settings-row .hint { font-size: 11px; color: var(--text-dim); margin-left: 100px; margin-top: -8px; margin-bottom: 8px; }
  .settings-btn-row { display: flex; gap: 8px; margin-top: 16px; }
  .settings-btn-row button { flex: 1; }
  .settings-saved { color: var(--accent-green); font-size: 12px; opacity: 0; transition: opacity .3s; }
  .settings-saved.show { opacity: 1; }
  .settings-btn-gear {
    width: 36px; height: 36px; border-radius: 8px; border: 1px solid rgba(255,255,255,.15);
    background: rgba(255,255,255,.1); color: rgba(255,255,255,.7); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    transition: all .2s; margin-left: 12px;
  }
  .settings-btn-gear:hover { background: rgba(255,255,255,.2); color: #fff; border-color: rgba(255,255,255,.3); }

  /* Preset editor */
  .preset-edit-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
  .preset-edit-row input[type="text"] { flex: 1; padding: 6px 8px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; outline: none; }
  .preset-edit-row input[type="text"]:focus { border-color: var(--primary-light); }
  .preset-edit-row .preset-edit-label { max-width: 90px; flex: 0 0 90px; }
  .preset-edit-del { width: 26px; height: 26px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .preset-edit-del:hover { border-color: #ef4444; color: #ef4444; }
  .preset-add-btn { padding: 5px 12px; border-radius: 5px; border: 1px dashed var(--border); background: transparent; color: var(--text-dim); cursor: pointer; font-size: 12px; width: 100%; margin-top: 2px; }
  .preset-add-btn:hover { border-color: var(--primary-light); color: var(--primary-light); }

  @media (max-width: 768px) {
    .container { flex-direction: column; height: auto; }
    .sidebar { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); }
    .header { padding: 14px 16px; }
    .header h1 { font-size: 17px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Agnes AI 创作工坊 <span>v2.0</span></h1>
  <div style="display:flex;align-items:center">
    <div class="header-status"><span class="status-dot" id="statusDot"></span><span id="statusText">Ready</span></div>
    <button class="settings-btn-gear" onclick="openSettings()" title="设置">⚙</button>
  </div>
</div>

<div class="container">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="tabs" id="tabBar">
      <button class="tab active" data-tab="image">图片生成</button>
      <button class="tab" data-tab="video">视频生成</button>
    </div>

    <!-- ====== Image Form ====== -->
    <form id="imageForm">
      <div class="form-group">
        <label>模型版本</label>
        <select name="model">
          <option value="agnes-image-2.1-flash">agnes-image-2.1-flash（文生图，推荐）</option>
          <option value="agnes-image-2.0-flash">agnes-image-2.0-flash（图生图/编辑）</option>
        </select>
      </div>
      <div class="form-group">
        <label>提示词 (Prompt)</label>
        <textarea name="prompt" placeholder="描述你想要生成的图片，支持中文...">一只发光的浮空城市，悬浮于晨雾峡谷之上，电影级写实</textarea>
        <div class="hint">支持中文，API 会自动翻译为英文</div>
      </div>
      <div class="form-group">
        <label>预设 Prompt</label>
        <div class="presets" id="imagePresets"></div>
      </div>
      <div class="row">
        <div class="form-group">
          <label>尺寸</label>
          <select name="size">
            <option value="1024x1024">1024×1024（方形）</option>
            <option value="1024x768">1024×768（横屏）</option>
            <option value="1152x864">1152×864（横屏）</option>
            <option value="768x1024">768×1024（竖屏）</option>
          </select>
        </div>
        <div class="form-group">
          <label>数量</label>
          <input type="number" name="n" min="1" max="4" value="1">
        </div>
      </div>

      <!-- Reference image: URL vs File -->
      <div class="form-group">
        <label>参考图片（图生图模式）</label>
        <div class="input-method-toggle">
          <button type="button" class="active" data-method="url">URL</button>
          <button type="button" data-method="file">本地上传</button>
        </div>
        <div class="ref-input url-input">
          <input type="url" name="image_url" placeholder="输入图片 URL...">
        </div>
        <div class="ref-input file-input" style="display:none">
          <div class="upload-area" id="imageUploadArea">
            <input type="file" name="images" accept="image/*" multiple>
            <div class="upload-label">点击选择图片 或 拖拽到此处</div>
            <div class="upload-preview" id="imagePreview"></div>
          </div>
        </div>
        <div class="hint">选中"图生图"模型后有效。支持 PNG / JPG</div>
      </div>

      <button type="submit" class="btn btn-primary" id="generateImageBtn">生成图片</button>
    </form>

    <!-- ====== Video Form ====== -->
    <form id="videoForm" style="display:none">
      <div class="form-group">
        <label>提示词 (Prompt)</label>
        <textarea name="prompt" placeholder="描述你想要生成的视频，建议用英文以获得更稳定效果...">A cinematic shot of a cat walking on a sunny beach at sunset, slow camera pan</textarea>
        <div class="hint">支持中文，API 会自动翻译。英文 prompt 效果更稳定</div>
      </div>
      <div class="form-group">
        <label>预设 Prompt</label>
        <div class="presets" id="videoPresets"></div>
      </div>
      <div class="row">
        <div class="form-group"><label>宽度</label><input type="number" name="width" value="1152" min="256" max="1920"></div>
        <div class="form-group"><label>高度</label><input type="number" name="height" value="768" min="256" max="1080"></div>
      </div>
      <div class="row">
        <div class="form-group">
          <label>帧数 (8n+1)</label>
          <select name="num_frames">
            <option value="121">121 帧 (~5秒)</option>
            <option value="241">241 帧 (~10秒)</option>
            <option value="441">441 帧 (~18秒)</option>
          </select>
        </div>
        <div class="form-group"><label>帧率 (fps)</label><input type="number" name="frame_rate" value="24" min="1" max="60"></div>
      </div>
      <div class="row">
        <div class="form-group"><label>随机种子 (可选)</label><input type="number" name="seed" placeholder="留空随机"></div>
        <div class="form-group">
          <label>模式</label>
          <select name="mode">
            <option value="">普通</option>
            <option value="keyframes">关键帧动画</option>
          </select>
        </div>
      </div>

      <!-- Video reference image -->
      <div class="form-group">
        <label>参考图片（图生视频/关键帧）</label>
        <div class="input-method-toggle">
          <button type="button" class="active" data-method="url">URL</button>
          <button type="button" data-method="file">本地上传</button>
        </div>
        <div class="ref-input url-input">
          <input type="url" name="image_url" placeholder="输入图片 URL（多图用逗号分隔）">
        </div>
        <div class="ref-input file-input" style="display:none">
          <div class="upload-area" id="videoUploadArea">
            <input type="file" name="images" accept="image/*" multiple>
            <div class="upload-label">点击选择图片 或 拖拽到此处</div>
            <div class="upload-preview" id="videoPreview"></div>
          </div>
        </div>
        <div class="hint">图生视频：1 张；关键帧/多图：2 张</div>
      </div>

      <div class="form-group">
        <label>负面提示词 (Negative Prompt)</label>
        <input type="text" name="negative_prompt" placeholder="模糊，抖动，扭曲...">
      </div>
      <button type="submit" class="btn btn-primary" id="generateVideoBtn">生成视频</button>
    </form>
  </div>

  <!-- Main content -->
  <div class="main">
    <div class="result-area" id="resultArea">
      <div class="result-placeholder" id="placeholder">
        <div class="icon">🎨</div>
        <h3>开始创作</h3>
        <p>在左侧填写参数，点击生成按钮<br>图片/视频结果将显示在这里</p>
      </div>
      <div id="resultContent" style="display:none; width:100%"></div>
    </div>
    <div class="history-section" id="historySection" style="display:none">
      <div class="history-header" onclick="toggleHistory()">
        <span class="arrow" id="historyArrow">▼</span>
        <span>历史记录</span>
        <span id="historyCount" style="font-size:12px;color:var(--border)"></span>
        <button class="clear-history-btn" onclick="event.stopPropagation();confirmClear()">清除</button>
      </div>
      <div class="history-body" id="historyBody">
        <div id="historyList"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = '';
let currentTab = 'image';
let pollingTimer = null;
let lastVideoPrompt = '';
const history = JSON.parse(localStorage.getItem('agnes_history') || '[]');

// ---- Tab switching ----
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    document.getElementById('imageForm').style.display = currentTab === 'image' ? '' : 'none';
    document.getElementById('videoForm').style.display = currentTab === 'video' ? '' : 'none';
    showPlaceholder();
  });
});

// ---- Default presets ----
const DEFAULT_IMAGE_PRESETS = [
  { label: "浮空城市", prompt: "一只发光的浮空城市，悬浮于晨雾峡谷之上，电影级写实" },
  { label: "赛博朋克", prompt: "未来城市集市，飞行汽车，全息招牌，赛博朋克风格" },
  { label: "柴犬", prompt: "一只可爱的柴犬在樱花树下睡觉，温暖的阳光" },
  { label: "Fantasy", prompt: "A beautiful fantasy landscape with mountains, waterfalls, and a giant moon, digital art" },
  { label: "水墨古风", prompt: "一位中国古风女子在月下抚琴，水墨画风格，唯美意境" },
  { label: "美食", prompt: "美食摄影，一盘精致的提拉米苏，俯拍，柔光，暖色调" },

// ---- File upload areas (drag & drop) ----
function setupUploadArea(areaId, previewId) {
  const area = document.getElementById(areaId);
  const input = area.querySelector('input[type="file"]');
  const preview = document.getElementById(previewId);

  area.addEventListener('click', () => input.click());

  area.addEventListener('dragover', (e) => {
    e.preventDefault(); area.classList.add('dragover');
  });
  area.addEventListener('dragleave', () => area.classList.remove('dragover'));
  area.addEventListener('drop', (e) => {
    e.preventDefault(); area.classList.remove('dragover');
    if (e.dataTransfer.files.length) {
      input.files = e.dataTransfer.files;
      updatePreview(input, preview);
    }
  });

  input.addEventListener('change', () => updatePreview(input, preview));
}

function updatePreview(input, previewEl) {
  previewEl.innerHTML = '';
  for (const file of input.files) {
    const reader = new FileReader();
    const wrap = document.createElement('div');
    wrap.className = 'thumb-wrap';
    reader.onload = (e) => {
      wrap.innerHTML = `<img src="${e.target.result}" alt="preview">`;
    };
    reader.readAsDataURL(file);
    previewEl.appendChild(wrap);
  }
}

setupUploadArea('imageUploadArea', 'imagePreview');
setupUploadArea('videoUploadArea', 'videoPreview');

// ---- Build FormData (for upload) or JSON body ----
function buildRequest(form, tab) {
  const hasFiles = form.querySelector('input[type="file"]')?.files?.length > 0;
  const urlVal = form.querySelector('input[name="image_url"]')?.value?.trim();

  if (hasFiles) {
    // Multipart upload
    const fd = new FormData(form);
    // Remove unused fields
    fd.delete('image_url');
    if (tab === 'video') {
      // Ensure proper video params
    }
    return { type: 'multipart', data: fd, endpoint: tab === 'image' ? '/api/generate-image/upload' : '/api/create-video/upload' };
  } else {
    // JSON
    const fd = new FormData(form);
    const body = {};
    for (const [key, val] of fd.entries()) {
      if (key === 'image_url' && val) {
        body['images'] = val.split(',').map(s => s.trim()).filter(Boolean);
      } else if (key === 'images') {
        // skip (file input, handled above)
      } else if (key === 'n' || key === 'width' || key === 'height' || key === 'num_frames' || key === 'frame_rate' || key === 'seed') {
        const num = parseInt(val);
        if (!isNaN(num)) body[key] = num;
      } else if (key === 'mode' && val) {
        body[key] = val;
      } else if (key === 'negative_prompt' && val) {
        body[key] = val;
      } else if (val) {
        body[key] = val;
      }
    }
    return { type: 'json', data: body, endpoint: tab === 'image' ? '/api/generate-image' : '/api/create-video' };
  }
}

// ---- Image generation ----
document.getElementById('imageForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('generateImageBtn');
  const isUpload = e.target.querySelector('input[type="file"]')?.files?.length > 0;

  const req = buildRequest(e.target, 'image');
  const n = req.type === 'json' ? (req.data.n || 1) : 1;

  btn.disabled = true; btn.textContent = isUpload ? '正在上传图片...' : '正在生成图片...';
  let startTime = Date.now();
  let statusTimer = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    if (elapsed < 5 && isUpload) btn.textContent = '正在上传图片...';
    else btn.textContent = `正在生成图片... (${elapsed}s)`;
    // Show progress for parallel requests
    if (n > 1 && !isUpload) {
      const done = completedRequests || 0;
      btn.textContent = `正在生成图片... ${done}/${n} (${elapsed}s)`;
    }
  }, 1000);

  let completedRequests = 0;

  try {
    let allData;
    if (n > 1 && req.type === 'json') {
      // Parallel: send n concurrent requests, each with n=1
      const promises = [];
      for (let i = 0; i < n; i++) {
        const body = { ...req.data, n: 1 };
        promises.push(
          apiFetch(API_BASE + req.endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          }).then(async res => {
            const d = await res.json();
            completedRequests++;
            return d;
          })
        );
      }
      const results = await Promise.all(promises);
      const errors = results.filter(r => r.error);
      if (errors.length > 0) throw new Error(errors[0].error);
      allData = { data: results.flatMap(r => r.data || []) };
    } else {
      // Single request (upload or n=1)
      const ctrl = new AbortController();
      const timeoutId = setTimeout(() => ctrl.abort(), 300000);
      const opts = req.type === 'multipart'
        ? { method: 'POST', body: req.data, signal: ctrl.signal }
        : { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(req.data), signal: ctrl.signal };
      const res = await apiFetch(API_BASE + req.endpoint, opts);
      clearTimeout(timeoutId);
      allData = await res.json();
      if (allData.error) throw new Error(typeof allData.error === 'string' ? allData.error : JSON.stringify(allData.error));
    }
    showImageResult(allData, req.type === 'json' ? req.data : { prompt: '图片生成' });
    addHistory('image', req.type === 'json' ? (req.data.prompt || '') : '本地上传', allData);
  } catch (err) {
    if (err.name === 'AbortError') showError('请求超时，请稍后重试');
    else showError(err.message);
  } finally {
    clearInterval(statusTimer);
    btn.disabled = false; btn.textContent = '生成图片';
  }
});

    ? { method: 'POST', body: req.data }
    : { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(req.data) };

  try {

    const timeoutId = setTimeout(() => ctrl.abort(), 300000);
    opts.signal = ctrl.signal;
    const res = await apiFetch(API_BASE + req.endpoint, opts);
    clearTimeout(timeoutId);
    const data = await res.json();
    if (data.error) throw new Error(typeof data.error === 'string' ? data.error : JSON.stringify(data.error));
    const taskId = data.task_id || data.id;
    // Clear submission timer and re-enable button — progress shows in result area

    showVideoProgress(taskId, data);
  } catch (err) {
    if (err.name === 'AbortError') showError('请求超时，请稍后重试');
    else showError(err.message);
    clearInterval(statusTimer);
    btn.disabled = false; btn.textContent = '生成视频';
  }
});

// ---- Video polling ----
function showVideoProgress(taskId, params) {
  // Clear any existing polling and button timers
  if (pollingTimer) { clearTimeout(pollingTimer); pollingTimer = null; }
  const area = document.getElementById('resultContent');
  area.style.display = 'block';
  area.innerHTML = `
    <div class="result-card" style="text-align:center;padding:40px">
      <div class="spinner"></div>
      <div style="font-size:16px;font-weight:600;margin:12px 0">视频生成中...</div>
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:8px" id="progressElapsed">已等待 0s</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">排队中...</div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:8px">任务ID: ${taskId}</div>
    </div>
  `;
  document.getElementById('placeholder').style.display = 'none';
  pollVideo(taskId);

  // Update elapsed time every second
  const progressStart = Date.now();
  if (window._progressTimer) clearInterval(window._progressTimer);
  window._progressTimer = setInterval(() => {
    const el = document.getElementById('progressElapsed');
    if (el) {
      const secs = Math.floor((Date.now() - progressStart) / 1000);
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      el.textContent = m > 0 ? `已等待 ${m}分${s}秒` : `已等待 ${s}s`;
    }
  }, 1000);
}

async function pollVideo(taskId) {
  let errorCount = 0;
  const fn = async () => {
    try {
      const res = await apiFetch(API_BASE + `/api/video-status/${taskId}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      errorCount = 0;
      const progress = data.progress || 0;
      const status = data.status || 'unknown';
      const fill = document.getElementById('progressFill');
      const text = document.getElementById('progressText');
      if (fill) fill.style.width = progress + '%';
      if (text) {
        const m = { queued: '排队中...', in_progress: `生成中 ${progress}%`, completed: '已完成!', failed: '失败' };
        text.textContent = m[status] || status;
      }
      if (status === 'completed') { showVideoResult(data, taskId); return; }
      if (status === 'failed') { showError('视频生成失败'); return; }
      pollingTimer = setTimeout(fn, 3000);
    } catch (err) {
      errorCount++;
      const text = document.getElementById('progressText');
      if (text && errorCount < 5) {
        text.textContent = `查询失败 (${errorCount}/5)，自动重试...`;
        text.style.color = '#f59e0b';
        pollingTimer = setTimeout(fn, 5000);
      } else {
        if (window._progressTimer) { clearInterval(window._progressTimer); window._progressTimer = null; }
        const area = document.getElementById('resultContent');
        area.innerHTML = `
          <div class="result-card" style="text-align:center;padding:40px">
            <div style="font-size:40px;margin-bottom:12px">⚠️</div>
            <div style="color:#ef4444;font-weight:600;margin-bottom:8px">轮询失败</div>
            <div style="color:var(--text-dim);font-size:14px;margin-bottom:16px">${err.message}</div>
            <button class="btn btn-secondary" onclick="showVideoProgress('${taskId}')" style="width:auto;display:inline-flex;padding:8px 24px">重新开始轮询</button>
          </div>`;
      }
    }
  };
  await fn();
}

function showImageResult(data, params) {

      <div class="meta">

        <span style="float:right;font-size:11px;color:var(--text-dim)">${url.startsWith('/static/') ? '本地文件' : '外部链接'}</span>
      </div>

async function showVideoResult(data, taskId) {
  const remoteUrl = data.remixed_from_video_id || data.video_url || '';
  const area = document.getElementById('resultContent');
  area.style.display = 'block';

  // Save video locally so it plays inline (bypass CORS / Content-Disposition issues)
  let localUrl = '';
  if (remoteUrl) {
    localUrl = await saveFileLocally(remoteUrl);
  }

  const playUrl = localUrl || remoteUrl;
  if (window._progressTimer) { clearInterval(window._progressTimer); window._progressTimer = null; }
  area.innerHTML = `
    <div class="result-card">
      ${playUrl ? `<video src="${playUrl}" controls autoplay muted loop playsinline style="width:100%"></video>` : '<div style="padding:40px;text-align:center">视频 URL 未返回</div>'}
      <div class="meta">${remoteUrl ? `<a href="${remoteUrl}" target="_blank">下载原文件 →</a>` : ''}<span style="float:right">${data.seconds || '?'}秒 | ${data.size || '?'}</span></div>
    </div>`;
  document.getElementById('generateVideoBtn').disabled = false;
  document.getElementById('generateVideoBtn').textContent = '生成视频';
  addHistory('video', lastVideoPrompt, data);
}

function showError(msg) {
  const area = document.getElementById('resultContent');
  area.style.display = 'block';
  if (window._progressTimer) { clearInterval(window._progressTimer); window._progressTimer = null; }
  area.innerHTML = `<div class="result-card" style="text-align:center;padding:40px"><div style="font-size:40px;margin-bottom:12px">⚠️</div><div style="color:#ef4444;font-weight:600;margin-bottom:8px">生成失败</div><div style="color:var(--text-dim);font-size:14px">${msg}</div></div>`;
  document.getElementById('placeholder').style.display = 'none';
}

function showPlaceholder() {
  document.getElementById('resultContent').style.display = 'none';
  document.getElementById('placeholder').style.display = '';
  if (pollingTimer) { clearTimeout(pollingTimer); pollingTimer = null; }
  if (window._progressTimer) { clearInterval(window._progressTimer); window._progressTimer = null; }
}

let historyOpen = false;

function toggleHistory() {
  historyOpen = !historyOpen;
  const body = document.getElementById('historyBody');
  const arrow = document.getElementById('historyArrow');
  body.classList.toggle('open', historyOpen);
  arrow.classList.toggle('collapsed', !historyOpen);

async function getAuthHeaders() {
  const s = loadSettings();
  return s.apiKey ? { 'X-Agnes-Api-Key': s.apiKey } : {};
}

async function apiFetch(url, opts = {}) {
  const auth = getAuthHeaders();
  if (auth['X-Agnes-Api-Key']) {
    opts.headers = { ...opts.headers, ...auth };
  }
  return fetch(url, opts);
}

async function saveFileLocally(url) {
  try {
    const res = await apiFetch('/api/save-file', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    const data = await res.json();
    return data.localUrl || '';
  } catch (e) {
    return '';
  }
}

async function addHistory(type, prompt, data) {
  // Get remote URLs from response
  const urls = [];
  if (type === 'image' && data.data) {
    data.data.forEach(d => { if (d.url) urls.push(d.url); });
  }
  if (type === 'video') {
    const vu = data.remixed_from_video_id || data.video_url || '';
    if (vu) urls.push(vu);
  }

  // Save first URL locally for thumbnail
  let localUrl = '';
  if (urls.length > 0) {
    localUrl = await saveFileLocally(urls[0]);
  }

  const item = {
    type,
    prompt: prompt?.slice(0, 80) || '',
    thumb: localUrl || urls[0] || '',   // prefer local, fallback to remote
    allUrls: urls,
    localUrls: localUrl ? [localUrl] : [],
    timestamp: Date.now()
  };
  history.unshift(item);
  if (history.length > 50) history.pop();
  localStorage.setItem('agnes_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const section = document.getElementById('historySection');
  const countEl = document.getElementById('historyCount');
  if (!history.length) { section.style.display = 'none'; return; }
  section.style.display = '';
  countEl.textContent = `(${history.length})`;
  list.innerHTML = history.map((item, i) => {
    const icon = item.type === 'image' ? '🖼' : '🎬';
    const thumbSrc = item.thumb;
    // Always show icon behind the thumbnail image/video
    const bgIcon = `<div class="thumb" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--surface2);border-radius:6px">${icon}</div>`;
    const content = thumbSrc
      ? (item.type === 'image'
          ? `<img class="thumb" src="${thumbSrc}" loading="lazy" style="position:relative;z-index:1;background:var(--surface2)" onerror="this.style.display='none'">`
          : `<video class="thumb" src="${thumbSrc}" muted preload="metadata" style="position:relative;z-index:1;background:var(--surface2)" onerror="this.style.display='none'"></video>`)
      : '';
    return `<div class="history-item" onclick="showHistoryItem(${i})" ondblclick="openHistoryItem(${i})">
      <div style="position:relative;width:48px;height:48px;flex-shrink:0;border-radius:6px;overflow:hidden">${bgIcon}${content}</div>
      <div class="info"><div class="title">${escHtml(item.prompt || '无提示词')}</div><div class="sub">${new Date(item.timestamp).toLocaleString()}</div></div>
      <span class="type-badge ${item.type}">${item.type === 'image' ? '图片' : '视频'}</span>
    </div>`;
  }).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showHistoryItem(i) {
  const item = history[i];
  const area = document.getElementById('resultContent');
  area.style.display = 'block';
  document.getElementById('placeholder').style.display = 'none';

  if (item.type === 'image') {
    const urls = (item.localUrls || item.allUrls || []);
    if (urls.length === 0 && item.thumb) {
      // Old history entry with only a thumbnail
      area.innerHTML = `<div class="image-grid"><div class="result-card">
        <a href="${item.thumb}" target="_blank"><img src="${item.thumb}" loading="lazy" alt="generated" style="cursor:zoom-in"></a>
        <div class="meta"><a href="${item.thumb}" target="_blank">打开原图 →</a></div>
      </div></div>`;
      return;
    }
    if (urls.length === 0) {
      area.innerHTML = `<div class="result-card" style="text-align:center;padding:40px;color:var(--text-dim)">图片地址已失效</div>`;
      return;
    }
    area.innerHTML = `<div class="image-grid">${urls.map(url => `
      <div class="result-card">
        <a href="${url}" target="_blank"><img src="${url}" loading="lazy" alt="generated" style="cursor:zoom-in"></a>
        <div class="meta">
          <a href="${url}" target="_blank">打开原图 →</a>
          <span style="float:right;font-size:11px;color:var(--text-dim)">${url.startsWith('/static/') ? '本地文件' : '外部链接'}</span>
        </div>
      </div>`).join('')}</div>`;
  } else {
    const url = (item.localUrls && item.localUrls[0]) || item.thumb || '';
    if (!url) {
      area.innerHTML = `<div class="result-card" style="text-align:center;padding:40px;color:var(--text-dim)">视频地址已失效</div>`;
      return;
    }
    area.innerHTML = `
      <div class="result-card">
        ${url ? `<video src="${url}" controls autoplay muted loop playsinline style="width:100%"></video>` : '<div style="padding:40px;text-align:center">无视频文件</div>'}
        <div class="meta">
          ${url ? `<a href="${url}" target="_blank">下载视频 →</a>` : ''}
          <span style="float:right;font-size:11px;color:var(--text-dim)">${url.startsWith('/static/') ? '本地文件' : '外部链接'}</span>
        </div>
      </div>`;
  }
}

function openHistoryItem(i) {
  const item = history[i];
  if (!item) return;
  if (item.type === 'image') {
    const urls = (item.localUrls || item.allUrls || []);
    const target = urls[0] || item.thumb || '';
    if (target) window.open(target, '_blank');
  } else {
    const url = (item.localUrls && item.localUrls[0]) || item.thumb || '';
    if (url) window.open(url, '_blank');
  }
}

async function confirmClear() {
  if (!confirm('确定清除所有历史记录吗？\n本地保存的图片/视频文件也会被删除。')) return;

  // Clear local files via API
  try {
    await apiFetch('/api/clear-files', { method: 'POST' });
  } catch (e) { /* ignore */ }

  // Clear history
  history.length = 0;
  localStorage.removeItem('agnes_history');
  renderHistory();

  // Show placeholder if result area was showing history item
  showPlaceholder();
}

renderHistory();

        <div class="settings-row">
          <label>API Key</label>
          <input type="password" id="settingApiKey" placeholder="输入你的 Agnes API Key">
        </div>
        <div class="settings-row"><div class="hint">留空则使用环境变量 AGNES_API_KEY</div></div>
      </div>

      <!-- Image Defaults -->
      <div class="settings-group">
        <h3>图片默认值</h3>
        <div class="settings-row">
          <label>默认模型</label>
          <select id="settingImageModel">
            <option value="agnes-image-2.1-flash">agnes-image-2.1-flash（推荐）</option>
            <option value="agnes-image-2.0-flash">agnes-image-2.0-flash</option>
          </select>
        </div>
        <div class="settings-row">
          <label>默认尺寸</label>
          <select id="settingImageSize">
            <option value="1024x1024">1024×1024（方形）</option>
            <option value="1024x768">1024×768（横屏）</option>
            <option value="1152x864">1152×864（横屏）</option>
            <option value="768x1024">768×1024（竖屏）</option>
          </select>
        </div>
      </div>

      <!-- Video Defaults -->
      <div class="settings-group">
        <h3>视频默认值</h3>
        <div class="settings-row">
          <label>默认分辨率</label>
          <select id="settingVideoResolution">
            <option value="1152x768">1152×768</option>
            <option value="1024x768">1024×768</option>
            <option value="1280x720">1280×720（720p）</option>
            <option value="1920x1080">1920×1080（1080p）</option>
          </select>
        </div>
        <div class="settings-row">
          <label>默认帧数</label>
          <select id="settingVideoFrames">
            <option value="121">121 帧（~5秒）</option>
            <option value="241">241 帧（~10秒）</option>
            <option value="441">441 帧（~18秒）</option>
          </select>
        </div>
        <div class="settings-row">
          <label>默认帧率</label>
          <input type="number" id="settingVideoFps" min="1" max="60" value="24">
        </div>
      </div>

      <!-- History -->
      <div class="settings-group">
        <h3>历史记录</h3>
        <div class="settings-row">
          <label>最大条数</label>
          <input type="number" id="settingMaxHistory" min="10" max="200" value="50">
        </div>
      </div>

      <!-- Image Presets Editor -->
      <div class="settings-group">
        <h3>图片预设提示词</h3>
        <div id="settingsImagePresets"></div>
        <button class="preset-add-btn" onclick="addPreset('image')">+ 添加图片预设</button>
      </div>

      <!-- Video Presets Editor -->
      <div class="settings-group">
        <h3>视频预设提示词</h3>
        <div id="settingsVideoPresets"></div>
        <button class="preset-add-btn" onclick="addPreset('video')">+ 添加视频预设</button>
      </div>

      <div class="settings-btn-row">
        <button class="btn btn-secondary" onclick="resetSettings()">恢复默认</button>
        <button class="btn btn-primary" onclick="saveSettings()">保存设置</button>
      </div>
      <div style="text-align:center;margin-top:8px"><span class="settings-saved" id="settingsSaved">✓ 已保存</span></div>
    </div>
  </div>
</div>

<script>
// ---- Settings ----
const SETTINGS_KEY = 'agnes_settings';

function defaultSettings() {
  return {
    apiKey: '',
    imageModel: 'agnes-image-2.1-flash',
    imageSize: '1024x1024',
    videoResolution: '1152x768',
    videoFrames: 121,
    videoFps: 24,
    maxHistory: 50,
    imagePresets: JSON.parse(JSON.stringify(DEFAULT_IMAGE_PRESETS)),
    videoPresets: JSON.parse(JSON.stringify(DEFAULT_VIDEO_PRESETS)),
  };
}

function loadSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
    return { ...defaultSettings(), ...saved };
  } catch { return defaultSettings(); }
}

function saveSettingsToStorage(s) {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
}

// Apply settings to forms
function applySettings() {
  const s = loadSettings();

  // Image form
  const imgForm = document.getElementById('imageForm');
  const modelSel = imgForm.querySelector('select[name="model"]');
  const sizeSel = imgForm.querySelector('select[name="size"]');
  if (modelSel) modelSel.value = s.imageModel;
  if (sizeSel) sizeSel.value = s.imageSize;

  // Video form
  const vidForm = document.getElementById('videoForm');
  const w = vidForm.querySelector('input[name="width"]');
  const h = vidForm.querySelector('input[name="height"]');
  const frames = vidForm.querySelector('select[name="num_frames"]');
  const fps = vidForm.querySelector('input[name="frame_rate"]');
  const [vw, vh] = s.videoResolution.split('x').map(Number);
  if (w) w.value = vw;
  if (h) h.value = vh;
  if (frames) frames.value = s.videoFrames;
  if (fps) fps.value = s.videoFps;

  // History limit
  const oldMax = window._maxHistory || 50;
  window._maxHistory = s.maxHistory;
  // Trim history if needed
  if (history.length > s.maxHistory) {
    history.splice(s.maxHistory);
    localStorage.setItem('agnes_history', JSON.stringify(history));
    renderHistory();
  }

  // Sync API key to server on load so curl has access to it
  if (s.apiKey) {
    apiFetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_key: s.apiKey })
    }).catch(() => {});
  }

  // Render presets
  renderPresets();

  // Update API status
  updateApiStatus(s.apiKey);
}

function updateApiStatus(key) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (key) {
    dot.style.background = 'var(--accent-green)';
    text.textContent = 'API Key 已设置';
  } else {
    dot.style.background = '#f59e0b';
    text.textContent = '使用环境变量';
  }
}

// ---- Preset editor in settings ----
function renderPresetEditor(tab) {
  const s = loadSettings();
  const container = document.getElementById('settings' + tab[0].toUpperCase() + tab.slice(1) + 'Presets');
  const presets = tab === 'image' ? s.imagePresets : s.videoPresets;
  container.innerHTML = presets.map((p, i) => `
    <div class="preset-edit-row">
      <input type="text" class="preset-edit-label" placeholder="标签" value="${escHtml(p.label)}">
      <input type="text" class="preset-edit-prompt" placeholder="提示词" value="${escHtml(p.prompt)}">
      <button class="preset-edit-del" onclick="removePreset(this, '${tab}')" title="删除">×</button>
    </div>
  `).join('');
}

function addPreset(tab) {
  const s = loadSettings();
  const key = tab === 'image' ? 'imagePresets' : 'videoPresets';
  s[key].push({ label: '', prompt: '' });
  saveSettingsToStorage(s);
  renderPresetEditor(tab);
}

function removePreset(btn, tab) {
  const row = btn.closest('.preset-edit-row');
  const container = row.parentElement;
  const idx = Array.from(container.children).indexOf(row);
  const s = loadSettings();
  const key = tab === 'image' ? 'imagePresets' : 'videoPresets';
  s[key].splice(idx, 1);
  saveSettingsToStorage(s);
  renderPresetEditor(tab);
}

function collectPresetsFromEditor(tab) {
  const container = document.getElementById('settings' + tab[0].toUpperCase() + tab.slice(1) + 'Presets');
  const rows = container.querySelectorAll('.preset-edit-row');
  return Array.from(rows).map(row => ({
    label: row.querySelector('.preset-edit-label').value.trim(),
    prompt: row.querySelector('.preset-edit-prompt').value.trim(),
  })).filter(p => p.label || p.prompt);
}

// ---- Settings UI ----
function openSettings() {
  const s = loadSettings();
  document.getElementById('settingApiKey').value = s.apiKey;
  document.getElementById('settingImageModel').value = s.imageModel;
  document.getElementById('settingImageSize').value = s.imageSize;
  document.getElementById('settingVideoResolution').value = s.videoResolution;
  document.getElementById('settingVideoFrames').value = String(s.videoFrames);
  document.getElementById('settingVideoFps').value = s.videoFps;
  document.getElementById('settingMaxHistory').value = s.maxHistory;
  renderPresetEditor('image');
  renderPresetEditor('video');
  document.getElementById('settingsOverlay').classList.add('open');
  document.getElementById('settingsSaved').classList.remove('show');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}

function saveSettings() {
  const s = {
    apiKey: document.getElementById('settingApiKey').value.trim(),
    imageModel: document.getElementById('settingImageModel').value,
    imageSize: document.getElementById('settingImageSize').value,
    videoResolution: document.getElementById('settingVideoResolution').value,
    videoFrames: parseInt(document.getElementById('settingVideoFrames').value) || 121,
    videoFps: parseInt(document.getElementById('settingVideoFps').value) || 24,
    maxHistory: parseInt(document.getElementById('settingMaxHistory').value) || 50,
    imagePresets: collectPresetsFromEditor('image'),
    videoPresets: collectPresetsFromEditor('video'),
  };
  saveSettingsToStorage(s);

  // Sync API key to server
  if (s.apiKey) {
    apiFetch('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ api_key: s.apiKey })
    }).catch(() => {});
  }

  applySettings();
  document.getElementById('settingsSaved').classList.add('show');
  setTimeout(() => document.getElementById('settingsSaved').classList.remove('show'), 2000);
}

function resetSettings() {
  const def = defaultSettings();
  document.getElementById('settingApiKey').value = def.apiKey;
  document.getElementById('settingImageModel').value = def.imageModel;
  document.getElementById('settingImageSize').value = def.imageSize;
  document.getElementById('settingVideoResolution').value = def.videoResolution;
  document.getElementById('settingVideoFrames').value = String(def.videoFrames);
  document.getElementById('settingVideoFps').value = def.videoFps;
  document.getElementById('settingMaxHistory').value = def.maxHistory;
  // Reset presets to defaults
  saveSettingsToStorage(def);
  renderPresetEditor('image');
  renderPresetEditor('video');
}

// Override addHistory to respect maxHistory setting
const _origAddHistory = addHistory;
addHistory = async function(type, prompt, data) {
  await _origAddHistory.call(this, type, prompt, data);
  const max = window._maxHistory || 50;
  if (history.length > max) {
    history.splice(max);
    localStorage.setItem('agnes_history', JSON.stringify(history));
    renderHistory();
  }
};

// Apply settings on load
applySettings();
</script>

</body>
</html>
